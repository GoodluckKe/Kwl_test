<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b14"/>
      <stop offset="45%" stop-color="#0f1727"/>
      <stop offset="100%" stop-color="#120a16"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="52%" r="52%">
      <stop offset="0%" stop-color="#ffe7a1" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#ffe7a1" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <linearGradient id="beamA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="beamB" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <style>
      .pulseA { animation: pulseA 3.6s ease-in-out infinite; transform-origin: 960px 560px; }
      .pulseB { animation: pulseB 4.2s ease-in-out infinite; transform-origin: 960px 560px; }
      .floatL { animation: floatL 6.4s ease-in-out infinite; }
      .floatR { animation: floatR 7s ease-in-out infinite; }
      .flicker { animation: flicker 1.6s linear infinite; }
      .drift { animation: drift 20s linear infinite; }
      @keyframes pulseA {
        0%,100% { opacity: .2; transform: scale(1); }
        50% { opacity: .52; transform: scale(1.06); }
      }
      @keyframes pulseB {
        0%,100% { opacity: .14; transform: scale(1); }
        50% { opacity: .38; transform: scale(1.12); }
      }
      @keyframes floatL {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-14px); }
      }
      @keyframes floatR {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(16px); }
      }
      @keyframes flicker {
        0%,100% { opacity: .72; }
        48% { opacity: .32; }
        50% { opacity: .92; }
        54% { opacity: .44; }
      }
      @keyframes drift {
        0% { transform: translateX(0); }
        100% { transform: translateX(-120px); }
      }
      text { font-family: "PingFang SC","Microsoft YaHei",sans-serif; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#centerGlow)" class="pulseA"/>

  <g class="drift" opacity=".22" filter="url(#softBlur)">
    <ellipse cx="260" cy="960" rx="340" ry="180" fill="#0ea5e9"/>
    <ellipse cx="760" cy="920" rx="280" ry="150" fill="#dc2626"/>
    <ellipse cx="1300" cy="950" rx="320" ry="170" fill="#7c3aed"/>
    <ellipse cx="1760" cy="910" rx="260" ry="140" fill="#f59e0b"/>
  </g>

  <g class="pulseB">
    <path d="M420,820 L900,540" stroke="url(#beamA)" stroke-width="8" stroke-linecap="round" opacity=".55"/>
    <path d="M1500,820 L1020,540" stroke="url(#beamB)" stroke-width="8" stroke-linecap="round" opacity=".55"/>
    <path d="M300,290 L940,560" stroke="#93c5fd" stroke-width="5" stroke-linecap="round" opacity=".35"/>
    <path d="M1620,300 L980,560" stroke="#fda4af" stroke-width="5" stroke-linecap="round" opacity=".35"/>
  </g>

  <g opacity=".95">
    <g class="floatL" transform="translate(170 340)">
      <circle cx="0" cy="0" r="88" fill="#b91c1c" opacity=".88"/>
      <text x="0" y="16" font-size="60" text-anchor="middle" fill="#ffe4e6">炎</text>
      <text x="0" y="120" font-size="30" text-anchor="middle" fill="#fecaca">华夏</text>
    </g>
    <g class="floatL" transform="translate(430 250)">
      <circle cx="0" cy="0" r="82" fill="#1d4ed8" opacity=".88"/>
      <text x="0" y="16" font-size="56" text-anchor="middle" fill="#dbeafe">海</text>
      <text x="0" y="112" font-size="28" text-anchor="middle" fill="#bfdbfe">奥林匹斯</text>
    </g>
    <g class="floatL" transform="translate(720 190)">
      <circle cx="0" cy="0" r="78" fill="#6d28d9" opacity=".9"/>
      <text x="0" y="16" font-size="54" text-anchor="middle" fill="#ede9fe">梵</text>
      <text x="0" y="108" font-size="28" text-anchor="middle" fill="#ddd6fe">吠陀</text>
    </g>
  </g>

  <g opacity=".95">
    <g class="floatR" transform="translate(1750 340)">
      <circle cx="0" cy="0" r="88" fill="#111827" opacity=".9"/>
      <text x="0" y="16" font-size="58" text-anchor="middle" fill="#e5e7eb">霜</text>
      <text x="0" y="120" font-size="30" text-anchor="middle" fill="#d1d5db">阿斯加德</text>
    </g>
    <g class="floatR" transform="translate(1490 250)">
      <circle cx="0" cy="0" r="82" fill="#d97706" opacity=".9"/>
      <text x="0" y="16" font-size="56" text-anchor="middle" fill="#fef3c7">日</text>
      <text x="0" y="112" font-size="28" text-anchor="middle" fill="#fde68a">凯美特</text>
    </g>
  </g>

  <g class="flicker">
    <path d="M922,160 L965,380 L900,380 L1008,640 L982,460 L1048,460 Z" fill="#fef08a" opacity=".62"/>
    <circle cx="960" cy="560" r="120" fill="#fde68a" opacity=".14"/>
  </g>

  <g opacity=".65">
    <text x="960" y="905" font-size="92" text-anchor="middle" fill="#fef3c7">诸神对决</text>
    <text x="960" y="955" font-size="32" text-anchor="middle" fill="#cbd5e1">Mythic Clash of Civilizations</text>
  </g>
</svg>
